<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coral Island Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── CSS custom properties (overridden by tweaks) ── */
    :root {
      --accent:        #f97316;
      --accent-light:  #fff7ed;
      --accent-border: #fed7aa;
      --radius:        12px;
    }

    /* ── Animations ── */
    @keyframes ciWave {
      0%, 60%, 100% { transform: translateY(0);  }
      30%            { transform: translateY(-6px); }
    }
    @keyframes ciPageIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar              { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track        { background: transparent; }
    ::-webkit-scrollbar-thumb        { background: #99f6e4; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover  { background: #5eead4; }

    /* ── Form elements ── */
    select, input { font-family: 'Inter', sans-serif; }
    select:focus, input:focus { border-color: #0f766e !important; box-shadow: 0 0 0 3px rgba(15,118,110,0.12); }

    /* ── Mobile sidebar toggle ── */
    @media (max-width: 768px) {
      #ci-sidebar      { display: none !important; }
      #ci-mobile-tabs  { display: flex !important; }
      main             { padding-bottom: 70px; }
    }

    /* ── Prevent body scroll bleed ── */
    body { overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <!-- Game data (plain JS) -->
  <script src="data.js"></script>

  <!-- Components (Babel/JSX) — ORDER MATTERS -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui-components.jsx"></script>
  <script type="text/babel" src="sidebar.jsx"></script>
  <script type="text/babel" src="crops-page.jsx"></script>
  <script type="text/babel" src="caves-page.jsx"></script>
  <script type="text/babel" src="foraging-page.jsx"></script>
  <script type="text/babel" src="npc-page.jsx"></script>
  <script type="text/babel" src="ai-guide.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
